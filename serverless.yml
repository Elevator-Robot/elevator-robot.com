org: aphexlog
app: merdok
service: merdok

frameworkVersion: '3'

provider:
  name: aws
  runtime: python3.9
  stage: ${opt:stage, 'dev'}
  stackName: ${self:service}-${self:provider.stage}
  environment:
    DYNAMODB_TABLE_NAME: ${self:custom.DYNAMODB_TABLE_NAME}
  iamRoleStatements:
    - Effect: Allow
      Action:
        - dynamodb:Query
        - dynamodb:Scan
        - dynamodb:GetItem
        - dynamodb:PutItem
        - dynamodb:UpdateItem
        - dynamodb:DeleteItem
      Resource: !GetAtt ConversationsTable.Arn

functions:
  connect:
    handler: lambdas/handler.connect  # Updated the path to your Python file and function
    events:
      - websocket:
          route: $connect
  disconnect:
    handler: lambdas/handler.disconnect  # Updated the path to your Python file and function
    events:
      - websocket:
          route: $disconnect
  sendMessage:
    handler: lambdas/handler.sendMessage  # Updated the path to your Python file and function
    events:
      - websocket:
          route: sendMessage


resources:
  Resources:
    ConversationsTable:
      Type: 'AWS::DynamoDB::Table'
      DeletionPolicy: Delete
      Properties:
        AttributeDefinitions:
          - AttributeName: userId
            AttributeType: S
          - AttributeName: conversationId
            AttributeType: S
        KeySchema:
          - AttributeName: userId
            KeyType: HASH
          - AttributeName: conversationId
            KeyType: RANGE
        ProvisionedThroughput:
          ReadCapacityUnits: 1
          WriteCapacityUnits: 1
        TableName: ${self:custom.DYNAMODB_TABLE_NAME}

package:
  individually: true
  include:
    - "lambda/**/*"
  exclude:
    - "**/*"

custom:
  DYNAMODB_TABLE_NAME: ${self:service}-${opt:stage, self:provider.stage}
  client:
    bucketName: ${self:service}-client-${opt:stage, self:provider.stage}
    distributionFolder: client/public

plugins:
  - serverless-python-requirements
  - serverless-finch
