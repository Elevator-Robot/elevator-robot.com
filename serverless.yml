org: aphexlog
app: merdok
service: merdok

frameworkVersion: '3'

provider:
  name: aws
  runtime: python3.9
  stage: ${opt:stage, 'dev'}
  websocketsApiName: ${self:service}-${self:provider.stage}
  websocketsApiRouteSelectionExpression: $request.body.action
  websocketsDescription: Custom Serverless Websockets
  environment:
    DYNAMODB_CONVERSATIONS_TABLE_NAME: ${self:service}-${self:provider.stage}-conversations
    DYNAMODB_WEBSOCKET_TABLE_NAME: ${self:service}-${self:provider.stage}-websockets
    OPENAI_API_KEY: ${env:OPENAI_API_KEY}
  iamRoleStatements:
    - Effect: Allow
      Action:
        - dynamodb:Query
        - dynamodb:Scan
        - dynamodb:GetItem
        - dynamodb:PutItem
        - dynamodb:UpdateItem
        - dynamodb:DeleteItem
      Resource: 
        - !GetAtt ConversationsTable.Arn
        - !GetAtt WebsocketConnectionsTable.Arn
        - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/*'

custom:
  DOMAIN_NAME: elevator-robot.com
  client:
  # bucketName should be the domain name of your website
    bucketName: ${self:custom.DOMAIN_NAME}
    distributionFolder: client/public
  pythonRequirements:
    layer: true
    fileName: lambdas/requirements.txt

package:
  individually: true
  include:
    - "lambdas/"
  exclude:
    - "node_modules/**"
    - "test/**"
    - ".git/**"
    - ".serverless/**"
    - ".venv/**"
    - "serverless_sdk/**"
    - "client/**"
    - "package-lock.json"
    - "package.json"
    - "README.md"

functions:
  connect:
    handler: lambdas/handler.connect
    layers:
      - { Ref: PythonRequirementsLambdaLayer }
    events:
      - websocket:
          route: $connect
  disconnect:
    handler: lambdas/handler.disconnect
    layers:
      - { Ref: PythonRequirementsLambdaLayer }
    events:
      - websocket:
          route: $disconnect
  sendMessage:
    handler: lambdas/handler.sendMessage
    layers:
      - { Ref: PythonRequirementsLambdaLayer }
    events:
      - websocket:
          route: sendMessage


resources:
  Resources:
    ConversationsTable:
      Type: 'AWS::DynamoDB::Table'
      DeletionPolicy: Delete
      Properties:
        AttributeDefinitions:
          - AttributeName: userId
            AttributeType: S
          - AttributeName: conversationId
            AttributeType: S
        KeySchema:
          - AttributeName: userId
            KeyType: HASH
          - AttributeName: conversationId
            KeyType: RANGE
        ProvisionedThroughput:
          ReadCapacityUnits: 1
          WriteCapacityUnits: 1
        TableName: ${self:provider.environment.DYNAMODB_CONVERSATIONS_TABLE_NAME}
    WebsocketConnectionsTable:
      Type: 'AWS::DynamoDB::Table'
      DeletionPolicy: Delete
      Properties:
        AttributeDefinitions:
          - AttributeName: connectionId
            AttributeType: S
        KeySchema:
          - AttributeName: connectionId
            KeyType: HASH
        ProvisionedThroughput:
          ReadCapacityUnits: 1
          WriteCapacityUnits: 1
        TableName: ${self:service}-${self:provider.stage}-websockets
    # ElevatorRobotRecordSet:
    #   Type: "AWS::Route53::RecordSet"
    #   Properties: 
    #     HostedZoneName: "${self:custom.DOMAIN_NAME}."
    #     Name: "${self:custom.DOMAIN_NAME}."
    #     Type: A
    #     AliasTarget:
    #       HostedZoneId: "Z0809465328WIUFUDSAKZ"
    #       DNSName:  "s3-website-us-east-1.amazonaws.com"

plugins:
  - serverless-python-requirements
  - serverless-finch
