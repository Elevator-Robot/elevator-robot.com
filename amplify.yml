version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - npm install
            # - export VITE_APP_AWS_REGION=$(aws ssm get-parameter --name gatsby_app_aws_region --query Parameter.Value --output text --with-decryption)
            # - export VITE_APP_USER_POOL_ID=$(aws ssm get-parameter --name gatsby_app_user_pool_id --query Parameter.Value --output text --with-decryption)
            # - export VITE_APP_USER_POOL_WEB_CLIENT_ID=$(aws ssm get-parameter --name gatsby_app_user_pool_web_client_id --query Parameter.Value --output text --with-decryption)
            # - export VITE_APP_WEBSOCKET_URL=$(aws ssm get-parameter --name gatsby_app_websocket_url --query Parameter.Value --output text --with-decryption)
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: dist
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
    appRoot: .
